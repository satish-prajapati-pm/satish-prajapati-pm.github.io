<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 460" width="460" height="460">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#1c2150"/>
      <stop offset="100%" stop-color="#0b0d1a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c83ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7c83ff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c83ff"/>
      <stop offset="100%" stop-color="#ff7e5d"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="230" cy="230" r="230"/>
    </clipPath>
  </defs>

  <!-- background -->
  <circle cx="230" cy="230" r="230" fill="url(#bg)"/>

  <!-- glow -->
  <circle cx="230" cy="190" r="180" fill="url(#glow)"/>

  <!-- subtle grid lines -->
  <g stroke="#7c83ff" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="115" x2="460" y2="115"/>
    <line x1="0" y1="230" x2="460" y2="230"/>
    <line x1="0" y1="345" x2="460" y2="345"/>
    <line x1="115" y1="0" x2="115" y2="460"/>
    <line x1="230" y1="0" x2="230" y2="460"/>
    <line x1="345" y1="0" x2="345" y2="460"/>
  </g>

  <!-- shoulder / body silhouette -->
  <ellipse cx="230" cy="420" rx="155" ry="90" fill="#151936"/>
  <ellipse cx="230" cy="385" rx="110" ry="80" fill="#151936"/>

  <!-- head circle -->
  <circle cx="230" cy="195" r="90" fill="#1e2347"/>
  <circle cx="230" cy="195" r="88" fill="none" stroke="url(#ring)" stroke-width="1.5" opacity="0.5"/>

  <!-- initials -->
  <text x="230" y="218" font-family="Arial, sans-serif" font-weight="800" font-size="72" fill="#7c83ff" text-anchor="middle" letter-spacing="-3">SP</text>

  <!-- label pill at bottom -->
  <rect x="148" y="382" width="164" height="34" rx="17" fill="#151936" stroke="#7c83ff" stroke-width="1" stroke-opacity="0.35"/>
  <text x="230" y="404" font-family="'Courier New', monospace" font-size="12" fill="#9aa0c3" text-anchor="middle">replace with photo.jpg</text>
</svg>
